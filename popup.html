<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { width: 360px; max-width: 360px; margin: 0; overflow-x: hidden; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 14px; background: #111; color: #fff; }
    h1 { font-size: 15px; margin: 0 0 10px; line-height: 1.25; }
    .group-title { margin-top: 12px; font-size: 12px; color: #aaa; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    button { display: block; width: 100%; min-height: 40px; margin: 8px 0; padding: 9px 12px; border: 0; border-radius: 8px; cursor: pointer; font-weight: 600; line-height: 1.25; white-space: normal; overflow-wrap: break-word; }
    .readable { background: #149eca; color: white; }
    .complete { background: #5d3fd3; color: white; }
    #diag, #settings { background: #333; color: white; }
    #status { margin-top: 12px; font-size: 12px; color: #ddd; white-space: pre-wrap; line-height: 1.35; overflow-wrap: break-word; }
    .hint { font-size: 11px; color: #aaa; margin-top: 10px; white-space: pre-wrap; line-height: 1.35; overflow-wrap: break-word; }
  </style>
</head>
<body>
  <h1 data-i18n="popupTitle">ChatGPT Conversation Export</h1>
  <div class="group-title" id="groupReadable" data-i18n="readableConversation">Readable conversation</div>
  <button class="readable" id="readableJson" data-export-action="readable_json" data-i18n="exportReadableJsonButton">Readable conversation — JSON</button>
  <button class="readable" id="readableHtml" data-export-action="readable_html" data-i18n="exportReadableHtmlButton">Readable conversation — HTML</button>
  <div class="group-title" id="groupComplete" data-i18n="completeArchive">Complete archive</div>
  <button class="complete" id="completeJson" data-export-action="complete_json" data-i18n="exportCompleteJsonButton">Complete archive — JSON</button>
  <button class="complete" id="completeHtml" data-export-action="complete_html" data-i18n="exportCompleteHtmlButton">Complete archive — HTML</button>
  <button id="diag" data-export-action="diagnostic" data-i18n="diagnosticButton">API diagnostic only</button>
  <button id="settings" data-i18n="settingsButton">Settings</button>
  <div id="status" data-i18n="statusReady">V47 — backend API + session token.</div>
  <div class="hint" data-i18n="hint">Readable: for reading or continuing a conversation. Complete archive: includes internal messages and metadata.</div>
  <script src="i18n_local.js"></script>
  <script src="popup.js"></script>
</body>
</html>
